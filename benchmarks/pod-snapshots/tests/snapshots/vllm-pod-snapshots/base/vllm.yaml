apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-pod-snapshots
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: vllm-pod-snapshots
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: vllm-pod-snapshots
    spec:
      containers:
      - name: vllm-snapshots
        imagePullPolicy: Always
        args:
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --gpu-memory-utilization
        - "0.90"
        - --max-model-len
        - "4096"
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: TRANSFORMERS_CACHE
          value: /tmp/hf-cache
        - name: HF_HOME
          value: /tmp/hf-cache
        ports:
        - containerPort: 8000
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 1 # all delays must be low to make sure measurements are precise!
          failureThreshold: 1000000 # must be high 
          periodSeconds: 2
          successThreshold: 1
          timeoutSeconds: 1
        resources:  # Set resource requests and linits according to your requirements 
          limits:
            cpu: "4"
            memory: 80Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "4"
            memory: 80Gi
            nvidia.com/gpu: "1"
        securityContext:
          capabilities:
            drop:
            - NET_RAW
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tmp/hf-cache
          name: hf-cache
      dnsPolicy: ClusterFirst
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      restartPolicy: Always
      runtimeClassName: gvisor
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 60
      tolerations:
      - effect: NoSchedule
        key: sandbox.gke.io/runtime # DO NOT REMOVE OR IT WON'T RUN ON GVISOR !!!
        operator: Equal             # DO NOT REMOVE OR IT WON'T RUN ON GVISOR !!!
        value: gvisor               # DO NOT REMOVE OR IT WON'T RUN ON GVISOR !!!
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - effect: NoExecute
        key: node.kubernetes.io/not-ready
        operator: Exists
        tolerationSeconds: 300
      - effect: NoExecute
        key: node.kubernetes.io/unreachable
        operator: Exists
        tolerationSeconds: 300
      volumes:
      - emptyDir: {}
        name: hf-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
spec:
  selector:
    app: vllm-pod-snapshots
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer

