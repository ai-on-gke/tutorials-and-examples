steps:
- id: "adk-vertex: validate platform"
  name: "hashicorp/terraform:latest"
  dir: "/workspace/adk/vertex/terraform"
  script: |
    terraform init -no-color
    terraform validate -no-color
  waitFor: ["-"]

- id: 'adk-vertex: create gke cluster'
  name: "hashicorp/terraform:latest"
  dir: '/workspace/adk/vertex/terraform'
  env:
  - "KUBE_LOAD_CONFIG_FILE=false"
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/adk_vertex_gke_cluster_result.txt
    terraform apply \
    -var-file=default_env.tfvars \
    -var=project_id=$PROJECT_ID \
    -var=default_resource_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=cluster_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster \
    -var=cluster_location=$_ADK_VERTEX_REGION \
    -var=network_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=subnetwork_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=subnetwork_region=$_ADK_VERTEX_REGION \
    -var=image_repository_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=iam_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    -var=k8s_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    -auto-approve -no-color
    echo "pass" > /workspace/adk_vertex_gke_cluster_result.txt
  allowFailure: true
  waitFor: ['adk-vertex: validate platform']

- id: 'adk-vertex: generate kubeconfig'
  name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'container'
  - 'clusters'
  - 'get-credentials'
  - 'ml-adk-vertex-${SHORT_SHA}-${_PR_NUMBER}-${_BUILD_ID}-cluster'
  - '--region=${_ADK_VERTEX_REGION}'
  - '--project=${PROJECT_ID}'
  allowFailure: true
  waitFor: ['adk-vertex: create gke cluster']

- id: "adk-vertex: test guide"
  name: "gcr.io/cloud-builders/kubectl"
  env:
    - "CLOUDSDK_COMPUTE_ZONE=${_REGION}"
    - "CLOUDSDK_CONTAINER_CLUSTER=ml-${SHORT_SHA}-${_PR_NUMBER}-${_BUILD_ID}-cluster"
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    set -e
    echo "fail" > /workspace/adk_vertex_test_guide.txt

    echo "pass" > /workspace/adk_vertex_test_guide.txt
  allowFailure: true
  waitFor: ['adk-vertex: generate kubeconfig']

- id: 'adk-vertex: cleanup gke cluster'
  name: "hashicorp/terraform:latest"
  dir: '/workspace/adk/vertex/terraform'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/adk_vertex_cleanup_gke_cluster.txt
    terraform destroy \
    -var-file=default_env.tfvars \
    -var=project_id=$PROJECT_ID \
    -var=default_resource_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=cluster_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster \
    -var=cluster_location=$_ADK_VERTEX_REGION \
    -var=network_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=subnetwork_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=subnetwork_region=$_ADK_VERTEX_REGION \
    -var=image_repository_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    -var=iam_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    -var=k8s_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    -auto-approve -no-color
    echo "pass" > /workspace/adk_vertex_cleanup_gke_cluster.txt
  allowFailure: true
  waitFor: ['adk-vertex: test guide']

- id: 'check result'
  name: "hashicorp/terraform:latest"
  entrypoint: 'bash'
  waitFor: ['adk-vertex: cleanup gke cluster']
  args:
  - '-c'
  - |
    set -e

    echo "pass" > /workspace/check_result.txt

    if [[ $(cat /workspace/adk_vertex_gke_cluster_result.txt) != "pass" ]]; then
      echo "adk vertex gke cluster creation failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/adk_vertex_test_guide.txt) != "pass" ]]; then
      echo "adk vertex test guide failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/adk_vertex_cleanup_gke_cluster.txt) != "pass" ]]; then
      echo "adk vertex gke cluster cleanup failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/check_result.txt) != "pass" ]]; then
      exit 1
    fi

substitutions:
  _ADK_VERTEX_REGION: us-central1
  _USER_NAME: github
  _AUTOPILOT_CLUSTER: "false"
  _BUILD_ID: ${BUILD_ID:0:8}
  _SHIPSHAPE_IMAGE: us-docker.pkg.dev/k8ssecurityvalidation-agent/k8ssecurityvalidation-agent/k8ssecurityvalidation-agent@sha256:cd45e6cd84e9a45462ddbca18c4731fd4e264d517ee98131eb5be4eb57691f44
logsBucket: gs://ai-on-gke-qss-build-logs
options:
  substitutionOption: "ALLOW_LOOSE"
  machineType: "E2_HIGHCPU_8"
timeout: 5400s
