    # -var-file=default_env.tfvars \
    # -var=project_id=$PROJECT_ID \
    # -var=default_resource_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    # -var=cluster_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster \
    # -var=cluster_location=$_ADK_VERTEX_REGION \
    # -var=network_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    # -var=subnetwork_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    # -var=subnetwork_region=$_ADK_VERTEX_REGION \
    # -var=image_repository_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER \
    # -var=iam_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    # -var=k8s_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa \
    # -auto-approve -no-color
    echo "pass" > /workspace/adk_vertex_gke_cluster_result.txt
  allowFailure: true
  waitFor: ['adk-vertex: validate platform']

- id: 'adk-vertex: generate kubeconfig'
  name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'container'
  - 'clusters'
  - 'get-credentials'
  - 'ml-adk-vertex-${SHORT_SHA}-${_PR_NUMBER}-${_BUILD_ID}-cluster'
  - '--region=${_ADK_VERTEX_REGION}'
  - '--project=${PROJECT_ID}'
  allowFailure: true
  waitFor: ['adk-vertex: create gke cluster']

