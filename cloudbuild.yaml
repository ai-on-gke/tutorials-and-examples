steps:
- id: 'adk-vertex: create gke cluster'
  name: "hashicorp/terraform:latest"
  dir: '/workspace/adk/vertex/terraform'
  allowFailure: true
  waitFor: ['-']
  env:
  - "KUBE_LOAD_CONFIG_FILE=false"
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/gke_cluster_result.txt
    terraform apply \
    -var-file=default_env.tfvars \
    -var=project_id=$PROJECT_ID \
    -var=default_resource_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-default-name
    -var=cluster_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster
    -var=cluster_location=$_ADK_VERTEX_REGION
    -var=network_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER
    -var=subnetwork_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER
    -var=subnetwork_region=$_ADK_VERTEX_REGION
    -var=image_repository_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-repository
    -var=iam_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa
    -var=k8s_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa
    -auto-approve -no-color
    echo "pass" > /workspace/gke_cluster_result.txt

- id: 'connect to the cluster'
  name: "hashicorp/terraform:latest"
  entrypoint: 'sh'
  allowFailure: true
  waitFor: ['adk-vertex: create gke cluster']
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/connect_to_the_cluster.txt
    gcloud container clusters get-credentials \
    ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster \
    --location $_ADK_VERTEX_REGION \
    --project $PROJECT_ID

    kubectl get pods

    echo "pass" > /workspace/connect_to_the_cluster.txt

- id: 'invoke the cluster'
  name: "hashicorp/terraform:latest"
  entrypoint: 'sh'
  allowFailure: true
  waitFor: ['connect to the cluster']
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/invoke_the_cluster.txt
    kubectl get pods
    echo "pass" > /workspace/invoke_the_cluster.txt

- id: 'adk-vertex: cleanup gke cluster'
  name: "hashicorp/terraform:latest"
  dir: '/workspace/adk/vertex/terraform'
  allowFailure: true
  waitFor: ['create gke cluster']
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    set -e

    echo "fail" > /workspace/cleanup_gke_cluster.txt
    terraform destroy \
    -var-file=default_env.tfvars \
    -var=project_id=$PROJECT_ID \
    -var=default_resource_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-default-name
    -var=cluster_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-cluster
    -var=cluster_location=$_ADK_VERTEX_REGION
    -var=network_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER
    -var=subnetwork_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER
    -var=subnetwork_region=$_ADK_VERTEX_REGION
    -var=image_repository_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-repository
    -var=iam_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa
    -var=k8s_service_account_name=ml-adk-vertex-$SHORT_SHA-$_PR_NUMBER-$_BUILD_ID-$_AUTOPILOT_CLUSTER-sa
    -auto-approve -no-color
    echo "pass" > /workspace/cleanup_gke_cluster.txt

- id: 'check result'
  name: "hashicorp/terraform:latest"
  entrypoint: 'bash'
  waitFor: ['cleanup gke cluster']
  args:
  - '-c'
  - |
    set -e

    echo "pass" > /workspace/check_result.txt

    if [[ $(cat /workspace/gke_cluster_result.txt) != "pass" ]]; then
      echo "gke cluster creation failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/dummy_failure_step.txt) != "pass" ]]; then
      echo "dummy failure step failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/connect_to_the_cluster.txt) != "pass" ]]; then
      echo "connect to the cluster step failed"
      echo "error" > /workspace/check_result.txt
    fi

    if [[ $(cat /workspace/invoke_the_cluster.txt) != "pass" ]]; then
      echo "invoke the cluster step failed"
      echo "error" > /workspace/check_result.txt
    fi

    cat /workspace/check_result.txt

    if [[ $(cat /workspace/check_result.txt) != "pass" ]]; then
      exit 1
    fi

substitutions:
  _ADK_VERTEX_REGION: us-central1
  _USER_NAME: github
  _AUTOPILOT_CLUSTER: "false"
  _BUILD_ID: ${BUILD_ID:0:8}
  _SHIPSHAPE_IMAGE: us-docker.pkg.dev/k8ssecurityvalidation-agent/k8ssecurityvalidation-agent/k8ssecurityvalidation-agent@sha256:cd45e6cd84e9a45462ddbca18c4731fd4e264d517ee98131eb5be4eb57691f44
logsBucket: gs://ai-on-gke-qss-build-logs
options:
  substitutionOption: "ALLOW_LOOSE"
  machineType: "E2_HIGHCPU_8"
timeout: 5400s
